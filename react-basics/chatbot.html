<!DOCTYPE html>
<html>

<head>
  <title>Chatbot</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    .send-button {
      background-color: rgb(25, 135, 84);
      color: #eee;
      padding:  12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .send-button:hover {
      background-color: hsla(120, 100%, 25%, 0.829);
    }

    .chat-input {
      padding: 12px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size: 15px;
      flex-grow: 1;
    }

    .chat-input-container {
      display: flex;
      margin-bottom: 30px;
      margin-top: 30px;
    }

    .app-container {
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-message-user {
      display: flex;
      justify-content: end;
      align-items: start;
      margin-top: 15px;
    }

    .chat-message-robot {
      display: flex;
      align-items: start;
    }

    .chat-message-text {
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin: 0 10px 20px 10px;
      font-size: 18px;
      max-width: 300px;
    }

    .chat-message-profile {
      width: 45px;
    }

    .chat-messages-container {
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #ccc;
      border-top-color: rgb(25, 135, 84);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }


    }

    .toggle-position-link {
      text-align: center;
      color: rgb(25, 135, 84);
      text-decoration: underline;
      cursor: pointer;
      margin-bottom: 15px;
      font-size: 17px;
    }

    .welcome-message {
      color: rgb(160, 160, 160);
      font-size: 15px;
      text-align: center;
      font-weight: bold;
      padding: 0 15px;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function ChatInput({ chatMessages, setChatMessages }) {
      const [InputText, setInputText] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);

      function saveInputText(event) {
        setInputText(event.target.value);
      }

      async function sendMessage() {

        if (isLoading || InputText === '') {
          return;
        }

        setIsLoading(true);

        setInputText('');
        const newChatMessages = [
          ...chatMessages,
          {
            message: InputText,
            sender: 'user',
            id: crypto.randomUUID()
          }
        ];

        setChatMessages([
          ...newChatMessages,
          {
            message: '',
            sender: 'robot',
            id: crypto.randomUUID(),
            isLoading: true
          }
        ]);

        const response = await Chatbot.getResponseAsync(InputText);
        setChatMessages([
          ...newChatMessages,
          {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);

        setIsLoading(false);
      }

      function handleKeyDown(event) {
        if (event.key === 'Enter') {
          sendMessage();
        }
        else if (event.key === 'Escape') {
          setInputText('');
        }

      }

      return (
        <div className="chat-input-container">
          <input type="text"
            placeholder="Send a message to Chatbot"
            size="30"
            onChange={saveInputText}
            value={InputText}
            onKeyDown={handleKeyDown}
            className="chat-input"
          />
          <button
            onClick={sendMessage}
            className="send-button"
          >Send</button>
        </div>
      );
    }

    function ChatMessage({ message, sender, isLoading }) {
      // const message = props.message;
      // const sender = props.sender;
      // const {message, sender} = props;

      /*  if(sender === 'robot'){
         return (
           <div>
             <img src="robot.png" width="50px"/>
             {message}
           </div>
         ); */
      return (
        <div className={
          sender === 'user'
            ? 'chat-message-user'
            : 'chat-message-robot'
        }>
          {sender === 'robot' && (
            <img src="robot.png"
              className="chat-message-profile" />
          )}
          <div className="chat-message-text">
            {isLoading ? <div className="spinner"></div> : message}
          </div>
          {sender === 'user' && (
            <img src="user.png"
              className="chat-message-profile" />
          )}
        </div>
      );
    }

    function ChatMessages({ chatMessages }) {

      const chatMessagesRef = React.useRef(null);

      React.useEffect(() => {
        const contanierElem = chatMessagesRef.current;
        if (contanierElem) {
          contanierElem.scrollTop =
            contanierElem.scrollHeight
        }
      }, [chatMessages])

      return (
        <div
          className="chat-messages-container"
          ref={chatMessagesRef}
        >
          {chatMessages.length === 0 && (
            <div className="welcome-message">
              Welcome to the chatbot project! Send a message using the textbox above.
            </div>
          )}

          {chatMessages.map((chatMessage) => {
            return (
              <ChatMessage
                message={chatMessage.message}
                sender={chatMessage.sender}
                isLoading={chatMessage.isLoading}
                key={chatMessage.id}
              />
            );
          })}
        </div>
      );
    }

    function App() {
      const [chatMessages, setChatMessages] = React.useState([]);
      //   message: 'hello chatbot',
      //   sender: 'user',
      //   id: 'id1'
      // }, {
      //   message: 'Hello! How can I help you?',
      //   sender: 'robot',
      //   id: 'id2'
      // }, {
      //   message: 'Whats today day?',
      //   sender: 'user',
      //   id: 'id3'
      // }, {
      //   message: "Today is June 30",
      //   sender: "robot",
      //   id: 'id4'
      // }]);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages = array[0];
      // const setChatMessages = array[1];
      const [isInputOnTop, setIsInputOnTop] = React.useState(true);
      function toggleInputPosition() {
        setIsInputOnTop(!isInputOnTop);
      }
      return (
        <div className="app-container">

          {isInputOnTop && (
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          )}

          <ChatMessages
            chatMessages={chatMessages}
          />

          {!isInputOnTop && (
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          )}

          <div
            className="toggle-position-link"
            onClick={toggleInputPosition}
          >
            {isInputOnTop
              ? 'Move textbox to bottom'
              : 'Move textbox to top'}
          </div>

        </div>

      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>
</body>

</html>
